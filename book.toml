[book]
authors = ["enterprise-network-engineer-guide contributors"]
language = "zh-CN"
src = "."
title = "企业网络工程师学习手册"

[build]
build-dir = "book"
create-missing = false

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
additional-js = ["mermaid.min.js", "mermaid-init.js"]
default-theme = "light"
preferred-dark-theme = "navy"

[output.pdf]
