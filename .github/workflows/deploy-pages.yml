name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache mdBook tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-pdf
            ~/.cargo/bin/mdbook-epub
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-mdbook-0.5.3-mdbook-pdf-0.1.13-mdbook-epub-0.4.48

      - name: Install mdBook
        run: |
          if ! command -v mdbook >/dev/null 2>&1; then
            cargo install --locked mdbook --version 0.5.3
          fi
          if ! command -v mdbook-pdf >/dev/null 2>&1; then
            cargo install --locked mdbook-pdf --version 0.1.13
          fi
          if ! command -v mdbook-epub >/dev/null 2>&1; then
            cargo install --locked mdbook-epub --version 0.4.48
          fi

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      
      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Install Noto CJK fonts
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -fv
          fc-match "Noto Sans CJK SC"

      - name: Build book
        run: |
          find ./chapters -type f -name '*.md' | while read -r f; do mmdc -p .github/puppeteer-config.json -i "$f" -o "$f" -b transparent; done
          mdbook build

      - name: Prepare artifact
        run: |
          cp book/pdf/output.pdf enterprise-network-engineer-guide.pdf
          cp book/epub/output.epub enterprise-network-engineer-guide.epub

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-network-engineer-guide
          path: |
            enterprise-network-engineer-guide.pdf
            enterprise-network-engineer-guide.epub

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: book/html

  publish:
    name: Publish Document
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: enterprise-network-engineer-guide

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            enterprise-network-engineer-guide.pdf
            enterprise-network-engineer-guide.epub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
