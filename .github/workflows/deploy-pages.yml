name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache mdBook tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-mermaid
            ~/.cargo/bin/mdbook-pdf
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-mdbook-0.5.3-mdbook-mermaid-0.17.0-mdbook-pdf-0.1.13

      - name: Install mdBook
        run: |
          if ! command -v mdbook >/dev/null 2>&1; then
            cargo install --locked mdbook --version 0.5.3
          fi
          if ! command -v mdbook-mermaid >/dev/null 2>&1; then
            cargo install --locked mdbook-mermaid --version 0.17.0
          fi
          if ! command -v mdbook-pdf >/dev/null 2>&1; then
            cargo install --locked mdbook-pdf --version 0.1.13
          fi

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Mermaid assets
        run: mdbook-mermaid install .

      - name: Build book
        run: mdbook build

      - name: Prepare PDF artifact
        run: cp book/pdf/output.pdf enterprise-network-engineer-guide.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-network-engineer-guide
          path: enterprise-network-engineer-guide.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: book/html

  publish:
    name: Publish PDF Document
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: enterprise-network-engineer-guide

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: enterprise-network-engineer-guide.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
